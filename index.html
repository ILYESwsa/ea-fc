<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockCraft (Minecraft-style)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="hud">
      <div id="crosshair">+</div>
      <div id="top-left">
        <h1>BlockCraft</h1>
        <p>Click to lock mouse</p>
        <p>WASD move • Space jump • Shift sprint</p>
        <p>LMB break block • RMB place block • 1-5 select block</p>
      </div>
      <div id="status">Loading world...</div>
      <div id="hotbar"></div>
    </div>

    <div id="start-overlay">
      <div class="card">
        <h2>BlockCraft</h2>
        <p>A Minecraft-style browser prototype.</p>
        <button id="start-btn">Start Game</button>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
