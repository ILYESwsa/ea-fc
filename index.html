<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser FC - Level 3</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="hud">
      <div class="panel">
        <h1>Browser FC (Level 3)</h1>
        <p><strong>Controls:</strong> WASD / Arrow Keys to move, <kbd>Space</kbd> to pass, <kbd>Shift</kbd> to shoot.</p>
      </div>
      <div class="stats">
        <div>Score: <span id="score">0 - 0</span></div>
        <div>Time: <span id="time">90</span>s</div>
      </div>
      <div id="message"></div>
    </div>
    <script type="module" src="game.js"></script>
  </body>
</html>
